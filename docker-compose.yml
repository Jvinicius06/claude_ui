services:
  claude-code-ui:
    build: .
    container_name: claude-code-ui
    restart: unless-stopped
    network_mode: host
    environment:
      # Option A: Use API key (pay-as-you-go)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Option B: Leave ANTHROPIC_API_KEY empty and use OAuth login instead
      #           (run: docker compose run --rm claude-code-ui login)
      - SERVER_PORT=5001
      # - CONTEXT_WINDOW=160000
    volumes:
      # Reuse host login/credentials
      - /root/.claude:/home/claudeuser/.claude
      - /root/.anthropic:/home/claudeuser/.anthropic
      # Git credentials (persistent GitHub login from host)
      - /root/.git-credentials:/home/claudeuser/.git-credentials.host:ro
      - /root/.gitconfig:/home/claudeuser/.gitconfig.host:ro
      # Claude Code UI persistent data (users, auth, plugins)
      - /root/.cloudcli:/home/claudeuser/.cloudcli
      - /root/.claude-code-ui:/home/claudeuser/.claude-code-ui
      # Mount your projects directory
      - /root/projects:/home/claudeuser/projects
